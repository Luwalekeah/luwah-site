version: 2
updates:
  # Application dependencies. Minor and patch updates are grouped to reduce PR
  # noise. Major updates open individually so breaking changes get a real review.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      production-minor-patch:
        dependency-type: "production"
        update-types: ["minor", "patch"]
      dev-minor-patch:
        dependency-type: "development"
        update-types: ["minor", "patch"]

  # Keep the GitHub Actions in our workflows current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["ci"]
