name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      # Render auto-deploys from GitHub, so this step is informational.
      # If using manual deploy, add Render deploy hook here.

      - name: Notify Proxmox n8n of Successful Deploy
        if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          curl -X POST ${{ secrets.N8N_DEPLOY_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d '{"status": "success", "project": "luwah-technologies", "commit": "${{ github.sha }}", "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' \
          && echo "Deployment synced with home lab."
        continue-on-error: true
